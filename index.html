<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Calculadora reativa com abas interdependentes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CalcFlow" />
  <title>CalcFlow</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="app-logo">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="1" y="1" width="9" height="9" rx="2" fill="var(--accent)"/>
          <rect x="12" y="1" width="9" height="9" rx="2" fill="var(--accent2)" opacity="0.7"/>
          <rect x="1" y="12" width="9" height="9" rx="2" fill="var(--accent2)" opacity="0.7"/>
          <rect x="12" y="12" width="9" height="9" rx="2" fill="var(--accent)" opacity="0.4"/>
        </svg>
      </span>
      <span class="app-title">CalcFlow</span>
    </div>
    <div class="header-right">
      <!-- Conversor de unidades -->
      <button class="icon-btn" id="btn-converter" title="Conversão de unidades" aria-label="Converter unidades">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3L4 7l4 4"/><path d="M4 7h16"/>
          <path d="M16 21l4-4-4-4"/><path d="M20 17H4"/>
        </svg>
      </button>
      <!-- Tema -->
      <button class="icon-btn" id="btn-theme" title="Alternar tema" aria-label="Alternar tema">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <!-- Exportar -->
      <button class="icon-btn" id="btn-export" title="Exportar sessão" aria-label="Exportar sessão">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <!-- Importar -->
      <button class="icon-btn" id="btn-import" title="Importar sessão" aria-label="Importar sessão">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="import-file-input" accept=".json" style="display:none" />
    </div>
  </header>

  <!-- Tab Bar -->
  <div class="tab-bar-wrapper">
    <div class="tab-bar" id="tab-bar" role="tablist"></div>
    <button class="tab-add-btn" id="btn-add-tab" title="Nova aba" aria-label="Nova aba">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Main Content -->
  <main class="app-main" id="app-main"></main>

  <!-- Autocomplete Dropdown -->
  <div class="autocomplete-dropdown" id="autocomplete-dropdown" role="listbox" aria-label="Sugestões"></div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Modal: Conversão de Unidades -->
  <div class="conv-modal-overlay" id="conv-modal" role="dialog" aria-modal="true" aria-label="Conversão de unidades">
    <div class="conv-modal-box">
      <div class="conv-modal-header">
        <span class="conv-modal-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3L4 7l4 4"/><path d="M4 7h16"/>
            <path d="M16 21l4-4-4-4"/><path d="M20 17H4"/>
          </svg>
          Conversão de Unidades
        </span>
        <button class="conv-modal-close" id="conv-modal-close" aria-label="Fechar">✕</button>
      </div>
      <div class="conv-modal-body">
        <!-- Lista de categorias -->
        <div class="conv-cat-list" id="conv-cat-list"></div>
        <!-- Painel de conversão (injetado por JS) -->
        <div class="conv-panel" id="conv-panel"></div>
      </div>
    </div>
  </div>

  <!-- PWA Install Banner -->
  <div class="install-banner" id="install-banner" style="display:none">
    <span>📲 Instalar CalcFlow no dispositivo</span>
    <button id="btn-install">Instalar</button>
    <button class="install-dismiss" id="btn-dismiss-install" aria-label="Fechar">✕</button>
  </div>

  <script src="js/db.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/converter.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
